<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SyntaxWear - Tenis e Sneakers Online</title>
  <meta name="description"
    content="Compre os melhores tênis e sneakers online na SyntaxWear. Encontre modelos exclusivos, ofertas imperdiveis e frete grátis para todo o brasil." />

  <link rel="stylesheet" href="./css/reset.css">
  <link rel="stylesheet" href="./css/variables.css" />
  <link rel="stylesheet" href="./css/base.css" />
  <link rel="stylesheet" href="./css/layout.css" />
  
  <link rel="stylesheet" href="./css/components/hero.css" />
  <link rel="stylesheet" href="./css/components/header.css" />
  <link rel="stylesheet" href="./css/components/product-category.css" />
</head>

<body>
  <header class="header">
    <!-- Logo e navegação -->
    <h1 class="logo">
      <a href="/" title="SyntaxWear - Tenis e sneakers Online">
        <img src="./images/logo/logo.png" alt="SyntaxWear - Tenis e sneakers Online" />
      </a>
    </h1>

    <nav class="nav-center" aria-label="Categorias Principais">
      <ul>
        <li><a href="#">Masculino</a></li>
        <li><a href="#">Feminino</a></li>
        <li><a href="#">Outlet</a></li>
      </ul>
    </nav>

    <nav class="nav-right" aria-label="Acesso rápido">
      <ul>
        <li><a href="#">Nossas lojas</a></li>
        <li><a href="#">Sobre</a></li>
        <li><a href="#" aria-label="Minha conta"><img src="./images/icons/user.png" alt="Minha conta" />
          </a>
        </li>
        <li>
          <a href="#" aria-label="Ajuda"><img src="./images/icons/Vector.png" alt="Ajuda" /></a>
        </li>
        <li><a href="#" aria-label="Carrinho"><img src="./images/icons/bag.png" alt="Carrinho" /></a></li>
      </ul>
    </nav>

  </header>

  <main>
    <section class="hero-section">
      <!-- Seção hero -->
      <div class="hero-overlay">
        <div class="hero-content">
          <span class="hero-subtitle">Krypton One</span>
          <h2 class="hero-title">Tranforme qualquer passo em presença.</h2>
          <div class="hero-button">
            <a class="btn btn-outline" href="#">Ver modelos</a>
            <a class="btn btn-filled" href="#">Comprar</a>
          </div>
        </div>
      </div>

    </section>

    <section class="categories-section">
      <!-- Seção de categorias de tênis -->
      <div class="category-card casual">
        <span class="overlay"></span>

        <a href="#" class="category-link">
          <span class="category-name btn btn-outline">Casual</span>
        </a>
      </div>
      <div class="category-card esporte">
         <span class="overlay"></span>
        <a href="#" class="category-link">        
          <span class="category-name btn btn-outline">esporte</span>
        </a>
      </div>
      <div class="category-card colorido">
        <a href="#" class="category-link">
          <span class="overlay"></span>
          <span class="category-name btn btn-outline">Moderno</span>
        </a>
      </div>
      <div class="category-card futurista">
        <a href="#" class="category-link">
          <span class="overlay"></span>
          <span class="category-name btn btn-outline">Futurista</span>
        </a>
      </div>
      </div>
    </section>

    <section class="featured-products-section">
      <!-- Grid com produtos em destaque -->
    </section>
  </main>

  <footer>
    <div class="footer-contact">
      <!-- Informações de contato -->
    </div>
    <div class="footer-links">
      <!-- Links do footer -->
    </div>
  </footer>
</body>

</html>
